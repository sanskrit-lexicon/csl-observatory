name: Dependabot auto-merge

# Hands-off merge of non-major Dependabot pull requests after this workflow's
# validation job passes. Major bumps are intentionally left for human review.
# Deployed by /cologne-dependabot-automerge-all.

on: pull_request

permissions:
  contents: read

jobs:
  validate:
    name: Validate Dependabot PR
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Compile Python
        run: python -m compileall -q scripts observatory

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install site dependencies
        working-directory: observatory/site
        run: npm ci

      - name: Build site
        working-directory: observatory/site
        run: npm run build

  dependabot:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.actor == 'dependabot[bot]' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Approve the PR
        if: ${{ steps.meta.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr review --approve "$PR_URL" || true
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: ${{ steps.meta.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Hold major update for review
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-major' }}
        run: echo "Semver-major Dependabot update held for human review."
