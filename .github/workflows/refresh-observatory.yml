name: Refresh observatory

on:
  schedule:
    # Weekly: every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    # Manual trigger via GitHub UI / API
    inputs:
      since:
        description: 'Earliest date to fetch (YYYY-MM-DD)'
        required: false
        default: '2014-01-01'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  # Serialise data refreshes: the scheduled run and any manual dispatch (here
  # or in the legacy refresh.yml, which shares this group) both commit data/,
  # so they must never run at the same time. Queue rather than cancel so an
  # in-flight commit+deploy always finishes.
  group: observatory-data
  cancel-in-progress: false

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pyyaml

      - name: Install gh CLI
        run: |
          type -p gh >/dev/null || (sudo apt update && sudo apt install -y gh)
          gh --version

      - name: Fetch all repo data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINCE: ${{ inputs.since || '2014-01-01' }}
        run: |
          cd observatory
          python fetch.py --since "$SINCE"

      - name: Guard against silently dropped repos
        run: |
          # Fail loudly (leaving the last-good committed data live) if a large
          # repo came back with zero commits — a transient REST failure would
          # otherwise rebuild the dashboard with that history missing.
          python observatory/check_coverage.py

      - name: Transform snapshots
        run: |
          cd observatory
          python transform.py

      - name: Build people.yaml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd observatory
          python build_people.py

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install site dependencies
        run: |
          cd observatory/site
          npm ci

      - name: Copy data into site
        run: |
          mkdir -p observatory/site/src/data
          cp data/*.csv observatory/site/src/data/
          # manifest.json drives the site's row-count table and snapshot date,
          # so it must travel with the CSVs to stay in sync (no hand-typed counts).
          cp data/manifest.json observatory/site/src/data/

      - name: Regenerate findings
        run: |
          python scripts/bus_factor.py
          python scripts/repo_health.py
          python scripts/taxonomy_adoption.py
          python scripts/velocity_timeline.py
          python scripts/contributor_identity.py

      - name: Regenerate data catalog
        run: python scripts/data_index.py

      - name: Validate data catalog
        run: python scripts/data_index.py --check

      - name: Commit data refresh
        run: |
          git config user.name "csl-observatory-bot"
          git config user.email "actions@github.com"
          # Commit the transformed CSVs, the copied site data, and the
          # regenerated finding reports/CSVs. Raw JSONL snapshots are gitignored.
          git add data/ observatory/site/src/data/ reports/
          if git diff --staged --quiet; then
            echo "No data/report changes to commit."
          else
            git commit -m "data: monthly refresh ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Build site
        run: |
          cd observatory/site
          npm run build

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: observatory/site/dist

  deploy:
    needs: fetch-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
