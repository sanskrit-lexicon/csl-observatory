name: Refresh observatory

on:
  schedule:
    # Monthly fallback: 1st of each month at 03:00 UTC
    - cron: '0 3 1 * *'
  workflow_dispatch:
    # Manual trigger via GitHub UI / API
    inputs:
      since:
        description: 'Earliest date to fetch (YYYY-MM-DD)'
        required: false
        default: '2014-01-01'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pyyaml

      - name: Install gh CLI
        run: |
          type -p gh >/dev/null || (sudo apt update && sudo apt install -y gh)
          gh --version

      - name: Fetch all repo data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd observatory
          python fetch.py --since "${{ inputs.since || '2014-01-01' }}"

      - name: Transform snapshots
        run: |
          cd observatory
          python transform.py

      - name: Build people.yaml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd observatory
          python build_people.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Observable Framework
        run: |
          cd observatory/site
          npm install

      - name: Copy data into site
        run: |
          mkdir -p observatory/site/src/data
          cp data/*.csv observatory/site/src/data/

      - name: Build site
        run: |
          cd observatory/site
          npm run build

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: observatory/site/dist

      - name: Commit data refresh
        run: |
          git config user.name "csl-observatory-bot"
          git config user.email "actions@github.com"
          git add data/ observatory/snapshots/ -- ':!observatory/snapshots/2*/issues' ':!observatory/snapshots/2*/commits' || true
          # Snapshot raw data is gitignored; only commit transformed CSVs
          git diff --quiet && git diff --staged --quiet || git commit -m "data: monthly refresh ($(date -u +%Y-%m-%d))"
          git push || true

  deploy:
    needs: fetch-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
