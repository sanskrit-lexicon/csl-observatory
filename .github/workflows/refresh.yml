name: Refresh data snapshot (legacy pipeline)

# Manual-only. The canonical scheduled refresh is refresh-observatory.yml,
# which feeds the dashboard + findings. This older pull_data/compute_metrics/
# render_reports pipeline is kept for the legacy report tables; its schedule
# was removed to avoid two crons racing to commit data/.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Shared with refresh-observatory.yml: both pipelines commit data/, so they
  # must not run concurrently. Queue rather than cancel.
  group: observatory-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Pull data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/pull_data.py
          # Recover commit history for large repos the GraphQL endpoint can't
          # serve (csl-orig, cologne-stardict, VCP, hwnorm1, ...) via a bare
          # blob:none clone, before compute_metrics.py reads data/commits.json.
          python scripts/retry_via_clone.py
          python scripts/compute_metrics.py
          python scripts/render_reports.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: weekly snapshot $(date +%Y-%m-%d)"
            git push
          fi
